{% extends "base.html" %}

{% block content %}
<h2>Add Income</h2>
<form method="POST" action="/add_income">
    <input type="number" step="0.01" name="amount" placeholder="Amount" required><br>
    <input type="text" name="source" placeholder="Source (Salary, Freelance)" required><br>
    <input type="date" name="date" required><br>
    <button type="submit">Add Income</button>
</form>
{% endblock %}
