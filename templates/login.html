<!DOCTYPE html>
<html>
<head>
    <title>Login - Expense Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">

<div class="auth-container">

    <div class="auth-card">

        <h1>FinAudit Pro</h1>
        <p>Expense Management System</p>

        <form method="POST">

            <input type="email"
                   name="email"
                   placeholder="Email"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            Don't have an account?
            <a href="/signup">Sign Up</a>
        </p>

    </div>

</div>

</body>
</html>
